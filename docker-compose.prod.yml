version: '3.8'

# Docker Compose Consolidado para SoftWave - Ambiente de Produção EC2
# Este arquivo orquestra todos os microserviços backend em uma única EC2
# Variáveis de ambiente devem ser fornecidas via arquivo .env ou variáveis ENV

# Logging local padronizado (sem CloudWatch)
x-logging: &default-logging
  driver: "local"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  softwave-network:
    driver: bridge

services:
  # ============================================
  # BACKEND PRINCIPAL - Instância 1 (Porta 8081)
  # ============================================
  backend-1:
    image: softwave/backend:latest
    container_name: softwave-backend-1
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_VALIDITY=${JWT_VALIDITY:-3600}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-softwave-arquivos-prod}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MICROSERVICE_S3_URL=${MICROSERVICE_S3_URL:-http://localhost:8081}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - FILE_BASE_URL=${FILE_BASE_URL}
    volumes:
      - backend-1-logs:/var/log/softwave
      - backend-1-files:/opt/softwave/files
    networks:
      - softwave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    mem_limit: 1g
    cpu_shares: 512

  # ============================================
  # BACKEND PRINCIPAL - Instância 2 (Porta 8082)
  # ============================================
  backend-2:
    image: softwave/backend:latest
    container_name: softwave-backend-2
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_VALIDITY=${JWT_VALIDITY:-3600}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-softwave-arquivos-prod}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MICROSERVICE_S3_URL=${MICROSERVICE_S3_URL:-http://localhost:8081}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - FILE_BASE_URL=${FILE_BASE_URL}
    volumes:
      - backend-2-logs:/var/log/softwave
      - backend-2-files:/opt/softwave/files
    networks:
      - softwave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    mem_limit: 1g
    cpu_shares: 512

  # ============================================
  # AUTH SERVICE (Autenticação e Email)
  # ============================================
  auth-service:
    image: softwave/auth-service:latest
    container_name: softwave-auth-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_VALIDITY=${JWT_VALIDITY:-3600}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - auth-service-logs:/var/log/softwave
    networks:
      - softwave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 512m
    cpu_shares: 256

  # ============================================
  # S3 SERVICE (Bucket S3)
  # ============================================
  s3-service:
    image: softwave/s3-service:latest
    container_name: softwave-s3-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8091:8091"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8091
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-softwave-arquivos-prod}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MULTIPART_MAX_FILE_SIZE=${MULTIPART_MAX_FILE_SIZE:-10MB}
      - MULTIPART_MAX_REQUEST_SIZE=${MULTIPART_MAX_REQUEST_SIZE:-10MB}
    volumes:
      - s3-service-logs:/var/log/softwave
    networks:
      - softwave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    mem_limit: 512m
    cpu_shares: 256

  # ============================================
  # GEMINI IA SERVICE
  # ============================================
  gemini-service:
    image: softwave/gemini-service:latest
    container_name: softwave-gemini-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8092:8092"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8092
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - gemini-service-logs:/var/log/softwave
    networks:
      - softwave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 512m
    cpu_shares: 256

  # ============================================
  # CONSULTAS SERVICE
  # ============================================
  consultas-service:
    image: softwave/consultas-service:latest
    container_name: softwave-consultas-service
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8084
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_EXCHANGE=${RABBITMQ_EXCHANGE:-processos.exchange}
      - RABBITMQ_QUEUE=${RABBITMQ_QUEUE:-processos.queue}
      - RABBITMQ_ROUTING_KEY=${RABBITMQ_ROUTING_KEY:-processos.key}
    volumes:
      - consultas-service-logs:/var/log/softwave
    networks:
      - softwave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    mem_limit: 512m
    cpu_shares: 256

volumes:
  backend-1-logs:
    driver: local
  backend-2-logs:
    driver: local
  auth-service-logs:
    driver: local
  s3-service-logs:
    driver: local
  gemini-service-logs:
    driver: local
  consultas-service-logs:
    driver: local
  backend-1-files:
    driver: local
  backend-2-files:
    driver: local

