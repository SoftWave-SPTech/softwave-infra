worker_processes auto;

events {
    worker_connections 1024;
}


http {
    ##
    # Servidores EC2 que rodam o Nginx com o frontend
    ##
    upstream frontend_servers {
     server EC2_IP_A:8080;
     server EC2_IP_B:8080;
    }

    server {
        listen 80;
        server_name _;

        ##
        # PROXY PARA OS FRONTENDS
        ##
        location / {
            proxy_pass http://frontend_servers;

            # Repasse dos headers corretos
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA FIX – MUITO IMPORTANTE
            # Garante que as rotas como /perfil-advogado funcionem
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        ##
        # Importante para React SPA evitar erro 404
        ##
        location = /index.html {
            proxy_pass http://frontend_servers;
        }

        ##
        # Headers de segurança
        ##
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        ##
        # Logs do servidor
        ##
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
    }
}
