user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25M;

    # ============================================
    # UPSTREAMS - Balanceamento entre EC2 Backend
    # ============================================
    # Backend Principal - Balanceamento entre EC2 10.0.0.130 e 10.0.0.131
    upstream backend_apis {
        least_conn;  # Balanceamento por menor conexão
        server 10.0.0.130:8081 max_fails=3 fail_timeout=30s weight=1;
        server 10.0.0.131:8082 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
    }

    # S3 Service - Pode estar em qualquer EC2 backend
    # Ajuste os IPs conforme necessário ou use localhost se estiver na mesma EC2
    upstream s3_service {
        server 10.0.0.130:8091 max_fails=3 fail_timeout=30s;
        # server 10.0.0.131:8081 backup;  # Descomente se tiver backup
        keepalive 16;
    }

    # Auth Service
    upstream auth_service {
        server 10.0.0.130:8083 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Gemini Service
    upstream gemini_service {
        server 10.0.0.130:8092 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Consultas Service
    upstream consultas_service {
        server 10.0.0.130:8084 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ============================================
    # SERVIDOR PRINCIPAL
    # ============================================
    server {
        listen 80;
        server_name _;
        
        # Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Frontend React (servido estaticamente)
        location / {
            root /var/www/softwave-frontend;
            try_files $uri $uri/ /index.html;
            index index.html;
            
            # Cache para assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ============================================
        # APIS - Roteamento para microserviços
        # ============================================

        # API Backend Principal (balanceamento entre EC2)
        # Roteia /api/* para backend-1 ou backend-2
        location /api/ {
            # Remove /api do path ao fazer proxy
            rewrite ^/api/(.*)$ /$1 break;
            
            proxy_pass http://backend_apis;
            proxy_http_version 1.1;
            
            # Headers para proxy
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout 300s;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # API S3 Service - Upload/Download de arquivos
        location /api/s3 {
            rewrite ^/api/s3/(.*)$ /$1 break;
            
            proxy_pass http://s3_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout maior para uploads
            proxy_read_timeout 600s;
            proxy_connect_timeout 75s;
            client_max_body_size 10M;
        }

        # API Auth Service - Autenticação e Email
        location /api/auth {
            rewrite ^/api/auth/(.*)$ /$1 break;
            
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # API Gemini Service - IA
        location /api/gemini {
            rewrite ^/api/gemini/(.*)$ /$1 break;
            
            proxy_pass http://gemini_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout maior para processamento de IA
            proxy_read_timeout 600s;
            proxy_connect_timeout 75s;
        }

        # API Consultas Service - Consultas externas
        location /api/consultas {
            rewrite ^/api/consultas/(.*)$ /$1 break;
            
            proxy_pass http://consultas_service;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Actuator Health Checks (exposição segura)
        location /actuator/health {
            allow 10.0.0.0/24;  # Apenas VPC
            deny all;
            
            proxy_pass http://backend_apis;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # Healthcheck endpoint agregado do NGINX
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Negar acesso a arquivos sensíveis
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
