# Azure Container Instances Deployment Configuration
# This file can be used with 'az container create' command

apiVersion: '2021-09-01'
location: eastus
name: softwave-app
properties:
  containers:
  - name: softwave-app
    properties:
      image: softwaveacr.azurecr.io/softwave:latest
      resources:
        requests:
          cpu: 1
          memoryInGb: 1.5
      ports:
      - port: 3000
        protocol: TCP
      environmentVariables:
      - name: NODE_ENV
        value: production
      - name: DB_HOST
        value: softwave-db.postgres.database.azure.com
      - name: DB_PORT
        value: '5432'
      - name: DB_NAME
        value: softwave
      - name: DB_USER
        value: softwave_user
      - name: REDIS_HOST
        value: softwave-redis.redis.cache.windows.net
      - name: REDIS_PORT
        value: '6379'
      - name: DB_PASSWORD
        secureValue: YOUR_DB_PASSWORD_HERE
      - name: JWT_SECRET
        secureValue: YOUR_JWT_SECRET_HERE
  osType: Linux
  ipAddress:
    type: Public
    ports:
    - protocol: TCP
      port: 3000
    dnsNameLabel: softwave-app
  restartPolicy: Always
tags:
  environment: production
  project: softwave
type: Microsoft.ContainerInstance/containerGroups
