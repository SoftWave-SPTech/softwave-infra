# Google Cloud Run Service Configuration
# Deploy using: gcloud run services replace cloudrun-service.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: softwave-app
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '1'
        autoscaling.knative.dev/maxScale: '10'
    spec:
      containers:
      - image: gcr.io/PROJECT_ID/softwave:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: DB_HOST
          value: /cloudsql/PROJECT_ID:REGION:softwave-db
        - name: DB_PORT
          value: '5432'
        - name: DB_NAME
          value: softwave
        - name: DB_USER
          value: softwave_user
        - name: REDIS_HOST
          value: 10.0.0.3
        - name: REDIS_PORT
          value: '6379'
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-password
              key: latest
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: latest
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
  traffic:
  - percent: 100
    latestRevision: true
