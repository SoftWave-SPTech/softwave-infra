name: Deploy Nginx Load Balancer

on:
  push:
    branches: [ "feature/document" ]
  pull_request:
    branches: [ "feature/document" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      EC2_IP_A: ${{ secrets.EC2_IP_A }}
      EC2_IP_B: ${{ secrets.EC2_IP_B }}
      FRONT_IMG: ${{ secrets.DOCKERHUB_USERNAME }}/react-front-end-repo:latest
      NGINX_IMG: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-load-balancer:latest

    steps:
      - name: Checkout repo (softwave-infra)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show workspace (debug)
        run: |
          echo "PWD=$(pwd)"
          ls -la
          (ls -R || true) | sed -n '1,200p'

      - name: Install envsubst (gettext)
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Render nginx.conf (inject EC2 IPs)
        env:
          EC2_IP_A: ${{ secrets.EC2_IP_A }}
          EC2_IP_B: ${{ secrets.EC2_IP_B }}
        run: |
          TEMPLATE="nginx/nginx.conf"
          if [ ! -f "$TEMPLATE" ]; then
            echo "::error::Template not found at $TEMPLATE"
            ls -R | sed -n '1,200p'
            exit 1
          fi
          envsubst '${EC2_IP_A} ${EC2_IP_B}' < "$TEMPLATE" > "${TEMPLATE}.rendered"
          mv "${TEMPLATE}.rendered" "$TEMPLATE"
          echo "Rendered $TEMPLATE (head):"
          sed -n '1,120p' "$TEMPLATE"

      - name: Build Nginx Docker image (context = repo root)
        run: |
          docker build -f Dockerfile -t ${NGINX_IMG} .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Nginx image to Docker Hub
        run: docker push ${NGINX_IMG}

      # --- Ensure Docker on EC2_A (optional safety step) ---
      - name: Ensure Docker installed on EC2_A
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_A }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 10m
          command_timeout: 10m
          script: |
            set -euo pipefail
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y apt-transport-https ca-certificates curl gnupg lsb-release
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi
            sudo usermod -aG docker ubuntu || true
            sudo chown root:docker /var/run/docker.sock || true
            sudo chmod 660 /var/run/docker.sock || true
            sudo docker run --rm hello-world || true

      - name: Ensure Docker installed on EC2_B
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_B }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 10m
          command_timeout: 10m
          script: |
            set -euo pipefail
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y apt-transport-https ca-certificates curl gnupg lsb-release
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi
            sudo usermod -aG docker ubuntu || true
            sudo chown root:docker /var/run/docker.sock || true
            sudo chmod 660 /var/run/docker.sock || true
            sudo docker run --rm hello-world || true

      # --- Deploy Nginx on EC2_A (use runner interpolation) ---
      - name: Deploy Nginx on EC2_A
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_A }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 10m
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "Searching docker binary..."
            if command -v docker >/dev/null 2>&1; then
              DOCKER_CMD="$(command -v docker)"
              SUDO_PREFIX=""
            else
              CANDS="/usr/bin/docker /usr/local/bin/docker /snap/bin/docker /bin/docker /usr/sbin/docker"
              FOUND=""
              for p in $CANDS; do
                if [ -x "$p" ]; then FOUND="$p" && break; fi
              done
              if [ -n "$FOUND" ]; then
                DOCKER_CMD="$FOUND"
                SUDO_PREFIX="sudo"
                echo "Docker binary found at $FOUND; will use sudo $FOUND"
              else
                if sudo -n docker info >/dev/null 2>&1; then
                  DOCKER_CMD="docker"
                  SUDO_PREFIX="sudo"
                  echo "sudo docker works (will use sudo docker)"
                else
                  echo "::error::Docker not found on host and sudo cannot run docker."
                  exit 2
                fi
              fi
            fi
            echo "Using: ${SUDO_PREFIX:+$SUDO_PREFIX }$DOCKER_CMD"
            run_docker() {
              if [ -n "${SUDO_PREFIX:-}" ]; then
                if [ "${DOCKER_CMD#/}" != "$DOCKER_CMD" ]; then sudo "$DOCKER_CMD" "$@"; else sudo docker "$@"; fi
              else
                "$DOCKER_CMD" "$@"
              fi
            }
            # NOTE: variables below are expanded on the runner before being sent to the remote host
            run_docker pull "${{ env.NGINX_IMG }}"
            run_docker stop nginx-load-balancer || true
            run_docker rm nginx-load-balancer || true
            run_docker run -d --name nginx-load-balancer -p 80:80 --restart unless-stopped "${{ env.NGINX_IMG }}"
            run_docker ps --filter "name=nginx-load-balancer" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      # --- Deploy frontend on EC2_A ---
      - name: Deploy frontend on EC2_A
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_A }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 10m
          command_timeout: 10m
          script: |
            set -euo pipefail
            if command -v docker >/dev/null 2>&1; then DOCKER_CMD="$(command -v docker)"; SUDO_PREFIX=""; else
              CANDS="/usr/bin/docker /usr/local/bin/docker /snap/bin/docker /bin/docker /usr/sbin/docker"
              FOUND=""
              for p in $CANDS; do if [ -x "$p" ]; then FOUND="$p" && break; fi; done
              if [ -n "$FOUND" ]; then DOCKER_CMD="$FOUND"; SUDO_PREFIX="sudo"; else
                if sudo -n docker info >/dev/null 2>&1; then DOCKER_CMD="docker"; SUDO_PREFIX="sudo"; else echo "::error::docker not found"; exit 2; fi
              fi
            fi
            echo "Using: ${SUDO_PREFIX:+$SUDO_PREFIX }$DOCKER_CMD"
            run_docker() {
              if [ -n "${SUDO_PREFIX:-}" ]; then
                if [ "${DOCKER_CMD#/}" != "$DOCKER_CMD" ]; then sudo "$DOCKER_CMD" "$@"; else sudo docker "$@"; fi
              else
                "$DOCKER_CMD" "$@"
              fi
            }
            run_docker pull "${{ env.FRONT_IMG }}"
            run_docker stop frontend || true
            run_docker rm frontend || true
            run_docker run -d --name frontend -p 8080:80 --restart unless-stopped "${{ env.FRONT_IMG }}"
            run_docker ps --filter "name=frontend" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      # --- Deploy frontend on EC2_B ---
      - name: Deploy frontend on EC2_B
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_B }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 10m
          command_timeout: 10m
          script: |
            set -euo pipefail
            if command -v docker >/dev/null 2>&1; then DOCKER_CMD="$(command -v docker)"; SUDO_PREFIX=""; else
              CANDS="/usr/bin/docker /usr/local/bin/docker /snap/bin/docker /bin/docker /usr/sbin/docker"
              FOUND=""
              for p in $CANDS; do if [ -x "$p" ]; then FOUND="$p" && break; fi; done
              if [ -n "$FOUND" ]; then DOCKER_CMD="$FOUND"; SUDO_PREFIX="sudo"; else
                if sudo -n docker info >/dev/null 2>&1; then DOCKER_CMD="docker"; SUDO_PREFIX="sudo"; else echo "::error::docker not found"; exit 2; fi
              fi
            fi
            echo "Using: ${SUDO_PREFIX:+$SUDO_PREFIX }$DOCKER_CMD"
            run_docker() {
              if [ -n "${SUDO_PREFIX:-}" ]; then
                if [ "${DOCKER_CMD#/}" != "$DOCKER_CMD" ]; then sudo "$DOCKER_CMD" "$@"; else sudo docker "$@"; fi
              else
                "$DOCKER_CMD" "$@"
              fi
            }
            run_docker pull "${{ env.FRONT_IMG }}"
            run_docker stop frontend || true
            run_docker rm frontend || true
            run_docker run -d --name frontend -p 8080:80 --restart unless-stopped "${{ env.FRONT_IMG }}"
            run_docker ps --filter "name=frontend" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
