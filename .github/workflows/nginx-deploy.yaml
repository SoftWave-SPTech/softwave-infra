name: Deploy Nginx Load Balancer

on:
  push: 
    branches: 
      [ "feature/document" ] 
  
  pull_request: 
    branches: 
      [ "feature/document" ]
      
jobs:
  build-and-deploy-nginx:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      EC2_IP_A: ${{ secrets.EC2_IP_A }}
      EC2_IP_B: ${{ secrets.EC2_IP_B }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show repo tree (debug)
        run: |
          echo "=== files (first 200 lines) ==="
          (ls -R || true) | sed -n '1,200p'

      - name: Install envsubst (gettext)
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Render nginx.conf (inject EC2 IPs)
        run: |
          TEMPLATE="softwave-infra/nginx/nginx.conf"
          if [ ! -f "$TEMPLATE" ]; then
            echo "::error::Template not found at $TEMPLATE"; ls -la softwave-infra || true; exit 1
          fi
          envsubst '${EC2_IP_A} ${EC2_IP_B}' < "$TEMPLATE" > "${TEMPLATE}.rendered"
          mv "${TEMPLATE}.rendered" "$TEMPLATE"
          echo "Rendered $TEMPLATE (head):"; sed -n '1,80p' "$TEMPLATE"

      - name: Build Docker image (context = softwave-infra)
        run: |
          docker build -f softwave-infra/Dockerfile -t ${DOCKERHUB_USER}/nginx-load-balancer:latest ./softwave-infra

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: docker push ${DOCKERHUB_USER}/nginx-load-balancer:latest

      - name: Deploy to EC2 (EC2_IP_A)
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_A }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker pull ${DOCKERHUB_USER}/nginx-load-balancer:latest
            docker stop nginx-load-balancer || true
            docker rm nginx-load-balancer || true
            docker run -d --name nginx-load-balancer -p 80:80 ${DOCKERHUB_USER}/nginx-load-balancer:latest
