name: Deploy Nginx Load Balancer

on:
  push: 
    branches: 
      [ "feature/document" ] 
  
  pull_request: 
    branches: 
      [ "feature/document" ]
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      EC2_IP_A: ${{ secrets.EC2_IP_A }}
      EC2_IP_B: ${{ secrets.EC2_IP_B }}
      FRONT_IMG: ${{ secrets.DOCKERHUB_USERNAME }}/react-front-end-repo:latest   # ajuste se necessário
      NGINX_IMG: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-load-balancer:latest
    steps:
      - name: Checkout repo (this repository = softwave-infra)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show workspace (debug)
        run: |
          echo "PWD=$(pwd)"
          ls -la
          (ls -R || true) | sed -n '1,200p'

      - name: Install envsubst (gettext)
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Render nginx.conf (inject EC2 IPs)
        env:
          EC2_IP_A: ${{ secrets.EC2_IP_A }}
          EC2_IP_B: ${{ secrets.EC2_IP_B }}
        run: |
          # IMPORTANT: paths are relative to repo root (softwave-infra)
          TEMPLATE="nginx/nginx.conf"
          if [ ! -f "$TEMPLATE" ]; then
            echo "::error::Template not found at $TEMPLATE"
            echo "Repository tree:"
            ls -R | sed -n '1,200p'
            exit 1
          fi
          envsubst '${EC2_IP_A} ${EC2_IP_B}' < "$TEMPLATE" > "${TEMPLATE}.rendered"
          mv "${TEMPLATE}.rendered" "$TEMPLATE"
          echo "Rendered $TEMPLATE (head):"
          sed -n '1,120p' "$TEMPLATE"

      - name: Build Nginx Docker image (context = repo root)
        run: |
          # Dockerfile is softwave-infra/Dockerfile -> here it's ./Dockerfile
          # If your Dockerfile is at softwave-infra/Dockerfile, build context is '.' and -f Dockerfile is optional.
          sudo docker build -f Dockerfile -t ${NGINX_IMG} .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Nginx image to Docker Hub
        run: sudo docker push ${NGINX_IMG}

      - name: Deploy Nginx on EC2_A (pull & run)
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_A }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker pull ${NGINX_IMG}
            sudo docker stop nginx-load-balancer || true
            sudo docker rm nginx-load-balancer || true
            sudo docker run -d --name nginx-load-balancer -p 80:80 ${NGINX_IMG}

      # Deploy frontend image on both EC2s (one job, two SSH actions)
      - name: Deploy frontend on EC2_A
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_A }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker pull ${FRONT_IMG}
            sudo docker stop frontend || true
            sudo docker rm frontend || true
            sudo docker run -d --name frontend -p 8080:80 ${FRONT_IMG}

      - name: Deploy frontend on EC2_B
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_IP_B }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            docker pull ${FRONT_IMG}
            sudo docker stop frontend || true
            sudo docker rm frontend || true
            sudo docker run -d --name frontend -p 8080:80 ${FRONT_IMG}
