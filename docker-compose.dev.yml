# Docker Compose for Development Environment
# Use this for local development with hot-reload

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: softwave-app-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=softwave
      - DB_USER=softwave_user
      - DB_PASSWORD=softwave_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - softwave-network
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    command: npm run dev

  postgres:
    image: postgres:15-alpine
    container_name: softwave-postgres-dev
    environment:
      - POSTGRES_DB=softwave
      - POSTGRES_USER=softwave_user
      - POSTGRES_PASSWORD=softwave_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - softwave-network

  redis:
    image: redis:7-alpine
    container_name: softwave-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - softwave-network
    command: redis-server --appendonly yes

  # Database admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: softwave-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@softwave.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - softwave-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # Redis admin UI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: softwave-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - softwave-network

networks:
  softwave-network:
    driver: bridge

volumes:
  postgres-dev-data:
  redis-dev-data:
  pgadmin-data:
